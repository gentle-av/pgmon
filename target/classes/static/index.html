<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PostgreSQL Monitor - Server Groups</title>
    <link rel="stylesheet" href="/css/framework/framework.css" />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  </head>
  <body data-refresh-interval="__REFRESH_INTERVAL__" data-theme="__THEME__">
    <div class="container">
      <div class="header">
        <h1>🐘 PostgreSQL Monitor</h1>
        <div class="header-controls"></div>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Servers</div>
          <div class="stat-value" id="total-servers">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Databases</div>
          <div class="stat-value" id="total-dbs">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Size</div>
          <div class="stat-value" id="total-size">0 GB</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Connections</div>
          <div class="stat-value" id="total-connections">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Avg Cache Hit</div>
          <div class="stat-value" id="avg-cache-hit">0%</div>
        </div>
      </div>
      <div id="servers-container" class="servers-container"></div>
      <div id="alerts-container" class="alerts-container"></div>
      <div id="timestamp" class="timestamp"></div>
    </div>
    <script src="/js/framework/core.js"></script>
    <script type="module" src="/js/App.js"></script>
  </body>
</html>
