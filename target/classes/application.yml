server:
  port: 3001

spring:
  profiles:
    active: dev
  web:
    resources:
      cache:
        period: 0

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.zaxxer.hikari: DEBUG
    avr.crypto: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

encryption:
  master-key: masterOfPuppets
